services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: redirect
      POSTGRES_PASSWORD: redirect
      POSTGRES_DB: redirect_platform
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U redirect -d redirect_platform"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "postgresql://redirect:redirect@postgres:5432/redirect_platform?schema=public"
      REDIS_URL: "redis://redis:6379"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  redirect-engine:
    build:
      context: .
      dockerfile: Dockerfile.redirect
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: production
      REDIRECT_ENGINE_PORT: "4000"
      DATABASE_URL: "postgresql://redirect:redirect@postgres:5432/redirect_platform?schema=public"
      REDIS_URL: "redis://redis:6379"
      DEFAULT_HOME_URL: "http://localhost:3000"
      REDIRECT_DELAY_SECONDS: "5"
      REDIRECT_PAGE_TITLE: "You are being redirected"
      REDIRECT_PAGE_MESSAGE: "Please wait while we take you to your destination."
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres-data:
  redis-data:
